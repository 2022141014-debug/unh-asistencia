<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistencia Docente | UNH</title>

  <link rel="stylesheet" href="css/docente.css"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="docente-body">

<main class="phone-shell">
  <section class="mobile-card">

    <header class="mobile-header">
      <div class="logo-box">UNH</div>

      <div class="header-divider"></div>

      <div class="header-text">
        <span>Unidad de Innovación Académica</span>
        <span>Dirección de Gestión Académica</span>
      </div>
    </header>

    <section class="title-section">
      <h2>REGISTRO DE ASISTENCIA</h2>
    </section>

    <section class="status-card" id="estadoAsistencia">
      <strong id="estadoTexto">Verificando...</strong>
      <p id="descripcionAsistencia"></p>
    </section>

    <section class="timer-box">
      <span>Tiempo restante</span>
      <strong id="contador">00:00</strong>
    </section>

    <section class="certificate-notice" id="avisoConstancia" hidden>
      <strong>Revise bien sus datos.</strong>
      <p>
        La información registrada será considerada para la emisión de su constancia de capacitación.
      </p>
    </section>

    <form id="formDocente" class="mobile-form">

      <label>DNI</label>
      <input id="dni" type="text" inputmode="numeric" maxlength="8" required>

      <label>Apellidos y nombres</label>
      <input id="nombreCompleto" type="text" required>

      <label>Departamento académico</label>
      <select id="departamento" required>
        <option value="">Seleccione</option>
        <option>DA ADMINISTRACION</option>
        <option>DA CIENCIAS AGRARIAS</option>
        <option>DA CIENCIAS DE LA SALUD</option>
        <option>DA CIENCIAS HUMANIDADES</option>
        <option>DA CONTABILIDAD</option>
        <option>DA DERECHO</option>
        <option>DA ECONOMIA</option>
        <option>DA ELECTRONICA</option>
        <option>DA ENFERMERIA</option>
        <option>DA INGENIERIA AGROINDUSTRIAL</option>
        <option>DA INGENIERIA AMBIENTAL LIRCAY</option>
        <option>DA INGENIERIA AMBIENTAL Y SANITARIA</option>
        <option>DA INGENIERIA CIVIL HUANCAVELICA</option>
        <option>DA INGENIERIA CIVIL LIRCAY</option>
        <option>DA INGENIERIA DE MINAS</option>
        <option>DA PEDAGOGIA</option>
        <option>DA SISTEMAS</option>
        <option>DA ZOOTECNIA</option>
      </select>

      <div class="location-status" id="ubicacionEstado">
        Primero debe verificar su ubicación.
      </div>

      <button type="button" class="btn location" id="btnVerificarUbicacion">
        📍 Pulsar para verificar ubicación
      </button>

      <button type="submit" class="btn primary" id="btnEnviar" disabled>
        Enviar asistencia
      </button>

      <button type="button" class="btn cancel" id="btnAnular" hidden>
        Anular asistencia
      </button>

    </form>

  </section>
</main>

<div id="toast" class="toast"></div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/docente.js"></script>

</body>
</html>
