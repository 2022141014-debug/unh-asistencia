<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistencia Docente | UNH</title>

  <link rel="stylesheet" href="css/docente.css"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="docente-body">

<main class="phone-shell">
  <section class="mobile-card">

    <header class="mobile-header">
      <div class="logo-box">UNH</div>

      <div class="header-divider"></div>

      <div class="header-text">
        <span>Unidad de Innovación Académica</span>
        <span>Dirección de Gestión Académica</span>
      </div>
    </header>

    <section class="title-section">
      <h2>REGISTRO DE ASISTENCIA</h2>
    </section>

    <section class="status-card" id="estadoAsistencia">
      <strong id="estadoTexto">Verificando...</strong>
      <p id="descripcionAsistencia"></p>
    </section>

    <section class="timer-box">
      <span>Tiempo restante</span>
      <strong id="contador">00:00</strong>
    </section>

    <section class="certificate-notice" id="avisoConstancia" hidden>
      <strong>Revise bien sus datos.</strong>
      <p>La información será usada para su constancia.</p>
    </section>

    <form id="formDocente" class="mobile-form">

      <label>DNI</label>
      <input id="dni" type="text" maxlength="8" required>

      <label>Nombres</label>
      <input id="nombres" type="text" required>

      <label>Apellido paterno</label>
      <input id="apellidoPaterno" type="text" required>

      <label>Apellido materno</label>
      <input id="apellidoMaterno" type="text" required>

      <label>Celular</label>
      <input id="celular" type="text" maxlength="9" required>

      <label>Departamento académico</label>
      <select id="departamento" required>
        <option>DA DE ADMINISTRACION</option>
  <option>DA DE CIENCIAS AGRARIAS</option>
  <option>DA DE CIENCIAS DE LA SALUD</option>
  <option>DA DE CIENCIAS HUMANIDADES</option>
  <option>DA DE CONTABILIDAD</option>
  <option>DA DE DERECHO</option>
  <option>DA DE ECONOMIA</option>
  <option>DA DE ELECTRONICA</option>
  <option>DA DE ENFERMERIA</option>
  <option>DA DE INGENIERIA AGROINDUSTRIAL</option>
  <option>DA DE INGENIERIA AMBIENTAL LIRCAY</option>
  <option>DA DE INGENIERIA AMBIENTAL Y SANITARIA</option>
  <option>DA DE INGENIERIA CIVIL HUANCAVELICA</option>
  <option>DA DE INGENIERIA CIVIL LIRCAY</option>
  <option>DA DE INGENIERIA DE MINAS</option>
  <option>DA DE PEDAGOGIA</option>
  <option>DA DE SISTEMAS</option>
  <option>DA DE ZOOTECNIA</option>
      </select>

      <button type="submit" class="btn primary" id="btnEnviar" disabled>
        Enviar asistencia
      </button>

      <button type="button" class="btn cancel" id="btnAnular" hidden>
        Anular asistencia
      </button>

    </form>

  </section>
</main>

<div id="toast" class="toast"></div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/docente.js"></script>

</body>
</html>
