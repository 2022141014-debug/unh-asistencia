<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes avanzados | Asistencia Docente</title>

  <link rel="stylesheet" href="css/reportes.css" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
  <main class="report-layout">
    <section class="report-card">

      <header class="report-header">
        <div>
          <span class="eyebrow">Panel administrativo</span>
          <h1>Reportes avanzados</h1>
          <p>Genera reportes de asistencia por día o por rango de fechas.</p>
        </div>

        <button class="btn btn-light" onclick="window.location.href='admin.html'">
          Volver al panel
        </button>
      </header>

      <div class="tabs">
        <button id="tabDia" class="tab active">
          <strong>Por día</strong>
          <span>Entrada, salida o general del día</span>
        </button>

        <button id="tabGeneral" class="tab">
          <strong>General</strong>
          <span>Reporte por rango de fechas</span>
        </button>
      </div>

      <section id="panelDia" class="panel active">
        <div class="panel-head">
          <h2>Reporte por día</h2>
          <p>Seleccione una fecha y el tipo de reporte que desea descargar.</p>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fechaDia" />
          </div>
        </div>

        <div class="option-actions">
          <button class="btn btn-primary" onclick="reporteDia('entrada')">
            Descargar entrada
          </button>

          <button class="btn btn-primary" onclick="reporteDia('salida')">
            Descargar salida
          </button>

          <button class="btn btn-primary" onclick="reporteDia('general')">
            Descargar general del día
          </button>
        </div>
      </section>

      <section id="panelGeneral" class="panel">
        <div class="panel-head">
          <h2>Reporte general</h2>
          <p>Seleccione un rango de fechas para calcular el reporte general.</p>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label>Desde</label>
            <input type="date" id="fechaInicio" />
          </div>

          <div class="form-group">
            <label>Hasta</label>
            <input type="date" id="fechaFin" />
          </div>
        </div>

        <div class="option-actions">
          <button class="btn btn-primary" onclick="reporteRango()">
            Descargar Excel general
          </button>
        </div>
      </section>

    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/supabase.js"></script>
  <script src="js/reportes.js"></script>
</body>
</html>
